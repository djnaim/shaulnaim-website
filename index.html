<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>שאול נעים | Shaul Naim</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0d0b0c" />
<style>
  :root{ --bg:#0d0b0c; --text:#f3efea; --muted:#b9b2ab; --red:#e6453e; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.7;
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:32px;
  }
  main{ max-width:560px; }
  h1{ font-size:clamp(40px,9vw,72px); font-weight:800; letter-spacing:-.5px; margin-bottom:18px; }
  p{ font-size:clamp(16px,2.6vw,20px); color:var(--muted); margin-bottom:10px; }
  .links{ margin-top:30px; display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  a{
    color:#fff; background:var(--red); text-decoration:none;
    padding:12px 26px; border-radius:999px; font-weight:600; font-size:16px;
  }
  a:focus-visible{ outline:3px solid #fff; outline-offset:3px; }
</style>
</head>
<body>
<main>
  <h1>שאול נעים</h1>
  <p>האתר בעדכון ויחזור בקרוב.</p>
  <p>Our website is being updated and will be back soon.</p>
  <div class="links">
    <a href="mailto:hello@shaulnaim.com" aria-label="שלחו אימייל ל hello@shaulnaim.com">hello@shaulnaim.com</a>
    <a href="tel:+972522511351" aria-label="התקשרו 052-251-1351">052-251-1351</a>
  </div>
</main>
</body>
</html>
